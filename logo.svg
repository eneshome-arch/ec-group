<svg viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!--
    EC GROUP — Full Horizontal Wordmark (white on dark)
    Mark (80x80) + wordmark right-aligned
  -->

  <!-- Mark, scaled to 80×80 (multiply 100→80 = ×0.8) -->
  <g transform="translate(0,0) scale(0.8)">
    <path
      d="M 50,20 L 20,20 L 20,80 L 50,80 M 20,50 L 42,50"
      stroke="white"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M 50,20 A 30,30 0 0,1 50,80"
      stroke="white"
      stroke-width="8"
      stroke-linecap="round"
    />
  </g>

  <!-- Wordmark: EC GROUP -->
  <text
    x="88"
    y="50"
    dominant-baseline="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-size="21"
    letter-spacing="4"
    fill="white"
  >EC GROUP</text>
</svg>
